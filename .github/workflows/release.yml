name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version (x.x.x.x)"
        required: true
        default: "1.0.0.0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build & package
        run: ./scripts/package.sh "${{ steps.ver.outputs.version }}"

      - name: Compute checksum & timestamp
        id: meta
        run: |
          ZIP="artifacts/jelifimusicbrainz_${{ steps.ver.outputs.version }}.zip"
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}')
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"

      - name: Commit manifest
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          CHECKSUM: ${{ steps.meta.outputs.checksum }}
          TIMESTAMP: ${{ steps.meta.outputs.timestamp }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            # Always re-apply against the latest origin/main so we never carry
            # a stale base across retries.
            git fetch origin main
            git reset --hard origin/main

            python3 - <<'PY'
          import json, os
          version = os.environ["VERSION"]
          checksum = os.environ["CHECKSUM"]
          timestamp = os.environ["TIMESTAMP"]
          repo = os.environ["GITHUB_REPOSITORY"]
          source_url = f"https://github.com/{repo}/releases/download/v{version}/jelifimusicbrainz_{version}.zip"
          with open("manifest.json") as f:
              data = json.load(f)
          plugin = data[0]
          entry = {
              "version": version,
              "changelog": f"Release {version}",
              "targetAbi": "10.10.0.0",
              "sourceUrl": source_url,
              "checksum": checksum,
              "timestamp": timestamp,
          }
          plugin["versions"] = [v for v in plugin["versions"] if v["version"] != version]
          plugin["versions"].insert(0, entry)
          with open("manifest.json", "w") as f:
              json.dump(data, f, indent=2)
          PY

            git add manifest.json
            if git diff --cached --quiet; then
              echo "No manifest changes."
              exit 0
            fi
            git commit -m "Update manifest for v${VERSION}"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected, retry $i…"
            sleep 2
          done
          echo "Failed to push manifest after retries" >&2
          exit 1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          files: artifacts/jelifimusicbrainz_${{ steps.ver.outputs.version }}.zip
          generate_release_notes: true
