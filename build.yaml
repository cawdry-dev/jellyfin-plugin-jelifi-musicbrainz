overview: "MusicBrainz metadata with release-type tagging."
description: >
  Drop-in replacement for the built-in MusicBrainz metadata provider.
  Adds release-group type tags (mb-type-album, mb-type-ep, mb-type-single,
  mb-type-live, mb-type-compilation, mb-type-soundtrack, etc.) so client
  apps can categorise an artist's discography by release type.
category: "Metadata"
owner: "cawdry-dev"
